name: 🤖 Android WebView Project Init

on:
  workflow_dispatch:

jobs:
  initialize:
    name: Generate Android Project Structure
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Step 1 - Hack Gradle Wrapper
        run: |
          echo "rootProject.name='temp'" > settings.gradle
          gradle wrapper --gradle-version 8.1.1

      - name: 🏗️ Step 2 - Generate WebView Project Structure
        run: |
          PKG="com.johirx.webinapp"
          APP_NAME="WebInApp"
          TARGET_URL="https://taimoor.pro.bd/filoox/index.php"
          DIR="app/src/main/java/com/johirx/webinapp"
          
          mkdir -p "$DIR"
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/assets

          # 1. Settings
          cat > settings.gradle <<EOF
          include ':app'
          rootProject.name='$APP_NAME'
          EOF

          # 2. Root build.gradle
          cat > build.gradle <<EOF
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 3. App build.gradle (Added WebView dependencies)
          cat > app/build.gradle <<EOF
          plugins { id 'com.android.application' }
          android {
              namespace '$PKG'
              compileSdk 33
              defaultConfig {
                  applicationId "$PKG"
                  minSdk 24
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.webkit:webkit:1.7.0'
          }
          EOF

          # 4. AndroidManifest.xml (Permissions & Hardware Acceleration)
          cat > app/src/main/AndroidManifest.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:allowBackup="true"
                  android:label="$APP_NAME"
                  android:hardwareAccelerated="true"
                  android:usesCleartextTraffic="true"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. MainActivity.java (Full WebView Logic)
          cat > "$DIR/MainActivity.java" <<EOF
          package $PKG;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private WebView myWebView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  myWebView = findViewById(R.id.webview);
                  WebSettings webSettings = myWebView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setDatabaseEnabled(true);
                  webSettings.setAllowFileAccess(true);
                  webSettings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  
                  myWebView.setWebViewClient(new WebViewClient());
                  myWebView.loadUrl("$TARGET_URL");
              }

              @Override
              public void onBackPressed() {
                  if (myWebView.canGoBack()) {
                      myWebView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

          # 6. Layout XML (Fullscreen WebView)
          cat > app/src/main/res/layout/activity_main.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
              <WebView
                  android:id="@+id/webview"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
          </RelativeLayout>
          EOF

      - name: 🔄 Step 3 - Commit & Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add .
          git commit -m "🚀 WebView Project initialized for $TARGET_URL"
          git push
