name: 🤖 Build Android App

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: ✅ Verify Gradle Wrapper
        run: |
          chmod +x ./gradlew
          ./gradlew --version

      - name: 🧪 Run Unit Tests (Optional)
        run: |
          ./gradlew testDebugUnitTest --stacktrace
        continue-on-error: true

      - name: 🔍 Run Lint Check (Optional)
        run: |
          ./gradlew lintDebug --stacktrace
        continue-on-error: true

      - name: 🏗️ Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: 🏗️ Build Release APK (Unsigned)
        run: |
          ./gradlew assembleRelease --stacktrace --no-daemon

      - name: 📦 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: warn

      - name: 📦 Upload Release APK (Unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: apk-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 14
          if-no-files-found: warn

      - name: 🎉 Build Summary
        run: |
          echo "✅ Build completed successfully!"
          echo "📁 Debug APK: app/build/outputs/apk/debug/app-debug.apk"
          echo "📁 Release APK: app/build/outputs/apk/release/app-release-unsigned.apk"
          echo "⬇️ Download from: Actions tab → Select this run → Artifacts section"
