name: 🤖 Android Project Init

on:
  workflow_dispatch:

jobs:
  initialize:
    name: Generate Android Project Structure
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Step 1 - Hack Gradle Wrapper (Bypass 9.x Error)
        run: |
          echo "rootProject.name='temp'" > settings.gradle
          gradle wrapper --gradle-version 8.1.1

      - name: 🏗️ Step 2 - Generate Project Structure
        run: |
          # Configurable Variables
          PKG="com.johirx.webinapp"
          APP_NAME="WebInApp"
          DIR="app/src/main/java/com/johirx/webinapp"
          
          # Create directory structure
          mkdir -p "$DIR"
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/assets

          # 1. settings.gradle
          cat > settings.gradle <<EOF
          include ':app'
          rootProject.name='$APP_NAME'
          EOF

          # 2. gradle.properties
          cat > gradle.properties <<EOF
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # 3. Root build.gradle
          cat > build.gradle <<EOF
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 4. App build.gradle
          cat > app/build.gradle <<EOF
          plugins { id 'com.android.application' }
          android {
              namespace '$PKG'
              compileSdk 33
              defaultConfig {
                  applicationId "$PKG"
                  minSdk 24
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

          # 5. AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="$PKG">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:label="$APP_NAME"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 6. MainActivity.java
          cat > "$DIR/MainActivity.java" <<EOF
          package $PKG;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
              }
          }
          EOF

          # 7. Layout XML
          cat > app/src/main/res/layout/activity_main.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
          </RelativeLayout>
          EOF

      - name: 🔄 Step 3 - Commit & Push Generated Files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add .
          git diff --cached --quiet || git commit -m "🤖 Auto-generated Android project structure via GitHub Actions"
          git push
